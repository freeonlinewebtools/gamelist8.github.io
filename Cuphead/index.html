<head>

  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Cuphead Web Port</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif}
    body{display:flex;align-items:center;justify-content:center}
    #gameContainer{width:100vw;height:100vh;position:relative;background:#000}
    canvas{width:100%!important;height:100%!important;image-rendering:pixelated;image-rendering:-moz-crisp-edges}
    #loader{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;z-index:999;overflow:hidden;
    }    #loader::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(to right,#1a3a8c 50%,#8c1a1a 50%);
    }
    #loader::after{
      content:'';position:absolute;inset:0;
      background:repeating-linear-gradient(
        to bottom,transparent 0,transparent 3px,
        rgba(0,0,0,.15) 3px,rgba(0,0,0,.15) 4px);
      pointer-events:none;
    }    #loader-inner{
      position:relative;z-index:2;
      display:flex;flex-direction:column;align-items:center;
      padding:0 1rem;gap:5px;
    }
    #logo{
      font-size:clamp(28px,7vw,52px);font-weight:900;letter-spacing:4px;color:#fff;
      text-shadow:4px 4px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000;
      margin-bottom:4px;
    }
    #logo span.red{color:#ff4444}
    #logo span.blue{color:#4488ff}
    #tip{
      color:#ffdd44;font-size:11px;font-weight:700;
      text-shadow:1px 1px 0 #000;text-align:center;letter-spacing:.5px;margin-bottom:2px;
    }
    #loading-text{
      color:#fff;font-size:clamp(13px,3vw,16px);font-weight:700;
      letter-spacing:1px;text-shadow:2px 2px 0 #000;
      text-align:center;max-width:480px;min-height:20px;
    }
    #progress-wrap{width:min(520px,88vw);display:flex;flex-direction:column;}
    #runner-wrap{position:relative;width:100%;height:64px;}
    #runner{
      position:absolute;bottom:0;left:0%;
      transform:translateX(-50%);transition:left .12s linear;pointer-events:none;
    }
    #runner img{width:64px;height:64px;display:block;filter:drop-shadow(2px 2px 0 #000);image-rendering:pixelated;}
    #bar{width:100%;height:22px;background:#000;border:3px solid #fff;box-shadow:4px 4px 0 #000;overflow:hidden;}
    #bar-fill{
      width:0%;height:100%;
      background:linear-gradient(to right,#ff2222,#ffaa00,#ffff22);
      transition:width .12s linear;
    }
    #stage-label{color:rgba(255,255,255,.6);font-size:10px;margin-top:3px;letter-spacing:.5px;text-align:center;min-height:14px;}
    #port-credit{color:rgba(255,255,255,.7);font-size:11px;font-weight:700;letter-spacing:1px;text-shadow:1px 1px 0 #000;text-align:center;margin-top:3px;}
  </style>
</head>

        <div id="bar"><div id="bar-fill"></div></div>
      </div>
      <div id="stage-label"></div>
      <div id="port-credit">Fix Port by The Super Mario Library</div>
    </div>
  </div>
</div>
<script>
(function(){
'use strict';

var txtEl    = document.getElementById('loading-text');
var barFill  = document.getElementById('bar-fill');
var runnerEl = document.getElementById('runner');
var stageEl  = document.getElementById('stage-label');

function setText(s)  { txtEl.textContent   = s; }
function setStage(s) { stageEl.textContent = s; }
function setProgress(pct) {
  var c = Math.max(0, Math.min(100, pct));
  barFill.style.width = c + '%';
  runnerEl.style.left = c + '%';
}
function showError(msg) {
  setText('Error: ' + msg + ' - refresh to retry.');
  txtEl.style.color        = '#ff6666';
  barFill.style.background = '#ff4444';
  barFill.style.transition = 'none';
}

/* ── WASM check ─────────────────────────────────────────────────────────
   Chrome on Chromebook always supports WebAssembly.
   When WASM is available Unity will ONLY request the WASM code file —
   it never touches the ASM.js build. Skipping the ASM download saves
   ~24 MB of network traffic, one full blob-build phase, and the memory
   that would have been used for those 3 parts. ── */
var USE_WASM = (typeof WebAssembly === 'object');

function buildParts(base, s, e) {
  var a = [];
  for (var i = s; i <= e; i++) a.push(base + '.part' + i);
  return a;
}
var WASM_PARTS = buildParts('Build/CupheadPort.wasm.code.unityweb', 1, 2);
var ASM_PARTS  = buildParts('Build/CupheadPort.asm.code.unityweb',  1, 3);
var DATA_PARTS = buildParts('Build/CupheadPort.data.unityweb',      1, 103);

/* Progress estimate: skip ASM bytes if USE_WASM */
var EST_BYTES = ((USE_WASM ? 0 : 3*8) + 2*15 + 103*20) * 1048576;
var loadedBytes = 0;

/* ── Cache API ── */
var CACHE_NAME = 'cuphead-v12';
var cacheOK    = false;

async function initCache() {
  try {
    await (await caches.open(CACHE_NAME)).match('__ping__');
    cacheOK = true;
  } catch(e) { cacheOK = false; }
}
async function cacheGet(url) {
  if (!cacheOK) return null;
  try {
    var hit = await (await caches.open(CACHE_NAME)).match(url);
    if (hit) return new Uint8Array(await hit.arrayBuffer());
  } catch(e) {}
  return null;
}
async function cachePut(url, bytes) {
  if (!cacheOK) return;
  try {
    await (await caches.open(CACHE_NAME)).put(url,
      new Response(bytes.buffer.slice(0),
        { headers: {'Content-Type':'application/octet-stream'} }));
  } catch(e) {}
}

/* ── Fetch one part with streaming ── */
async function fetchPart(url) {
  var hit = await cacheGet(url);
  if (hit) return hit;

  var resp = await fetch(url, { cache: 'force-cache' });
  if (!resp.ok) throw new Error('HTTP ' + resp.status + ' for ' + url);

  var chunks = [], total = 0;
  if (resp.body) {
    var rdr = resp.body.getReader();
    for (;;) {
      var r = await rdr.read();
      if (r.done) break;
      chunks.push(r.value);
      total       += r.value.byteLength;
      loadedBytes += r.value.byteLength;
      setProgress(Math.min(88, (loadedBytes / EST_BYTES) * 100));
      setText(Math.round(loadedBytes/1048576) + ' MB / ~' +
              Math.round(EST_BYTES/1048576)   + ' MB');
    }
  } else {
    var ab = await resp.arrayBuffer();
    loadedBytes += ab.byteLength;
    chunks = [new Uint8Array(ab)];
    total  = ab.byteLength;
  }

  var out = new Uint8Array(total), off = 0;
  for (var i = 0; i < chunks.length; i++) {
    out.set(chunks[i], off); off += chunks[i].byteLength;
  }
  chunks = null;
  await cachePut(url, out);
  return out;
}

/* ── Grouped Blob build ─────────────────────────────────────────────────
   Process 5 parts at a time (~100 MB per group in JS heap).
   After each group the Uint8Arrays are freed — only the Blob remains,
   and Blobs live outside the JS heap so they don't trigger OOM.
   Final Blob combines all group Blobs by reference (no data copy). ── */
var GROUP = 5;

async function buildBlobURL(parts, label) {
  var groupBlobs = [];
  for (var g = 0; g < parts.length; g += GROUP) {
    var end   = Math.min(g + GROUP, parts.length);
    var chunk = [];
    for (var i = g; i < end; i++) {
      setStage(label + '  ' + (i+1) + ' / ' + parts.length);
      chunk.push(await fetchPart(parts[i]));
    }
    groupBlobs.push(new Blob(chunk)); /* flush Uint8Arrays → Blob */
    chunk = null;
    await new Promise(function(r){ setTimeout(r, 30); }); /* GC breath */
  }
  var url = URL.createObjectURL(new Blob(groupBlobs));
  groupBlobs = null;
  return url;
}

function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = src; s.onload = resolve;
    s.onerror = function(){ reject(new Error('Script failed: ' + src)); };
    document.head.appendChild(s);
  });
}

/* ── Boot ── */
(async function main() {
  try {
    setProgress(1); setText('Checking cache...');
    await initCache();

    setProgress(3); setText('Loading Unity runtime...');
    await loadScript('Build/UnityLoader.js');

    setProgress(6);
    var wasmUrl = await buildBlobURL(WASM_PARTS, 'WASM');
    await new Promise(function(r){ setTimeout(r, 80); });

    /* Only download ASM if this browser has no WASM support */
    var asmUrl = null;
    if (!USE_WASM) {
      setProgress(14);
      asmUrl = await buildBlobURL(ASM_PARTS, 'ASM');
      await new Promise(function(r){ setTimeout(r, 80); });
    } else {
      setProgress(14);
      setStage('Skipping ASM (WASM supported)');
      await new Promise(function(r){ setTimeout(r, 30); });
    }

    setProgress(18);
    var dataUrl = await buildBlobURL(DATA_PARTS, 'Game data');
    await new Promise(function(r){ setTimeout(r, 150); });

    setProgress(91); setStage(''); setText('Starting game...');

    /* ── XHR redirect ── */
    var _open = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function() {
      var args = Array.prototype.slice.call(arguments);
      var u = args[1];
      if (typeof u === 'string') {
        if (u.indexOf('CupheadPort.data.unityweb') > -1) {
          args[1] = dataUrl;
        } else if (u.indexOf('CupheadPort.wasm.code.unityweb') > -1) {
          args[1] = wasmUrl;
        } else if (u.indexOf('CupheadPort.asm.code.unityweb') > -1) {
          /* If Unity somehow requests ASM anyway, serve WASM as fallback */
          args[1] = asmUrl || wasmUrl;
        }
      }
      return _open.apply(this, args);
    };

    UnityLoader.instantiate('gameContainer', 'Build/CupheadPort.json', {
      Module: {
        TOTAL_MEMORY:        67108864,
        ALLOW_MEMORY_GROWTH: 1
      },
      onProgress: function(inst, progress) {
        setProgress(91 + progress * 9);
        setText('Starting game... ' + Math.round(progress * 100) + '%');
        if (progress >= 1) {
          setStage('');
          setTimeout(function() {
            var ldr = document.getElementById('loader');
            if (ldr) {
              ldr.style.transition = 'opacity .6s ease';
              ldr.style.opacity    = '0';
              setTimeout(function(){
                if (ldr && ldr.parentNode) ldr.remove();
              }, 700);
            }
            try { URL.revokeObjectURL(wasmUrl); } catch(e) {}
            if (asmUrl) { try { URL.revokeObjectURL(asmUrl); } catch(e) {} }
            try { URL.revokeObjectURL(dataUrl); } catch(e) {}
          }, 1800);
        }
      }
    });

  } catch(err) {
    console.error('[Cuphead]', err);
    showError(err.message || String(err));
  }
})();

document.addEventListener('visibilitychange', function() {
  try {
    if (document.hidden) {
      var gi = window.gameInstance;
      if (gi && gi.Module && gi.Module.pauseMainLoop) gi.Module.pauseMainLoop();
    }
  } catch(e) {}
});
document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, {passive:false});
window.addEventListener('contextmenu', function(e){ e.preventDefault(); });
var _rt;
window.addEventListener('resize', function(){
  clearTimeout(_rt);
  _rt = setTimeout(function(){
    var c = document.querySelector('canvas');
    if (c){ c.style.width='100vw'; c.style.height='100vh'; }
  }, 200);
});
})();
</script>
</body>
